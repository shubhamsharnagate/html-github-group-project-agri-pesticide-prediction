<!DOCTYPE html>
<html>

<head>
    <title>Register - Agri Pesticide Prediction</title>
</head>

<body>

    <center>

        <h1>🌱 Agri Pesticide Prediction System</h1>

        <img src="./../login-register_img/profile-image.webp" width="100">

        <h2>🌾 Registration</h2>

        <form action="login.html" method="GET">

            <table cellpadding="5">

                <tr>
                    <td><label>Name:</label></td>
                    <td><input type="text" name="name" required></td>
                </tr>

                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="email" name="email" required></td>
                </tr>

                <tr>
                    <td><label>Phone Number:</label></td>
                    <td><input type="tel" name="phone" required></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="Male"> Male
                        <input type="radio" name="gender" value="Female"> Female
                    </td>
                </tr>

                <tr>
                    <td><label>Password:</label></td>
                    <td><input type="password" name="password" required></td>
                </tr>

                <tr>
                    <td><label>Confirm Password:</label></td>
                    <td><input type="password" name="confirm_password" required></td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Register">
                    </td>
                </tr>

            </table>

        </form>

        <br>

        <p>Already have an account?</p>
        <a href="login.html">Login Here</a>

        <br><br>

        <img src="./../login-register_img/crop-registration.webp" width="100">

        <h3><b>Grow Smart 🌾 Farm Smart</h3></b>

    </center>

</body>

</html>
